name: Release candidate

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

env:
  IMAGE_NAME: ghcr.io/mrchypark/kubernetes-secret-generator

jobs:
  candidate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Check out release tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Validate protected release source
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          SOURCE_COMMIT: ${{ github.sha }}
        run: |
          test "${{ github.ref_protected }}" = true
          scripts/validate-release.sh

      - name: Install locked Helm
        env:
          HELM_INSTALL_DIR: ${{ runner.temp }}/helm-bin
        run: |
          scripts/install-helm.sh
          echo "$HELM_INSTALL_DIR" >>"$GITHUB_PATH"

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build and push candidate once
        id: image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: build/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.IMAGE_NAME }}:candidate-${{ github.run_id }}-${{ github.run_attempt }}
          build-args: |
            VERSION=${{ github.ref_name }}
            REVISION=${{ github.sha }}
          provenance: false
          sbom: false

      - name: Verify digest and startup on both architectures
        env:
          DIGEST: ${{ steps.image.outputs.digest }}
        run: |
          printf '%s\n' "$DIGEST" | grep -Eq '^sha256:[0-9a-f]{64}$'
          test "$(docker buildx imagetools inspect "$IMAGE_NAME@$DIGEST" --format '{{.Manifest.Digest}}')" = "$DIGEST"
          docker buildx imagetools inspect "$IMAGE_NAME@$DIGEST" --raw >image-platforms.json
          jq -e '[.manifests[] | select(.platform.os == "linux") | (.platform.os + "/" + .platform.architecture)] | sort == ["linux/amd64", "linux/arm64"]' image-platforms.json >/dev/null
          amd64_digest=$(jq -er '.manifests[] | select(.platform.os == "linux" and .platform.architecture == "amd64") | .digest' image-platforms.json)
          arm64_digest=$(jq -er '.manifests[] | select(.platform.os == "linux" and .platform.architecture == "arm64") | .digest' image-platforms.json)
          for platform_digest in "$amd64_digest" "$arm64_digest"; do
            printf '%s\n' "$platform_digest" | grep -Eq '^sha256:[0-9a-f]{64}$'
          done
          docker run --rm --platform linux/amd64 "$IMAGE_NAME@$amd64_digest" --help >/dev/null
          docker run --rm --platform linux/arm64 "$IMAGE_NAME@$arm64_digest" --help >/dev/null
          printf '%s\n' "$DIGEST" >image-digest.txt

      - name: Scan and create an SBOM for each architecture
        env:
          DIGEST: ${{ steps.image.outputs.digest }}
        run: |
          for arch in amd64 arm64; do
            docker run --rm -v "$HOME/.docker/config.json:/root/.docker/config.json:ro" \
              anchore/grype:v0.104.1@sha256:e7d3cb36d2ebfb522141d83a5d0df9cda301f7e9f8747ee4af41f12c478fa77c \
              "$IMAGE_NAME@$DIGEST" --platform "linux/$arch" -o json >"grype-$arch.json"
            scripts/check-vulnerability-waivers.sh "grype-$arch.json" .github/vulnerability-waivers.json
            docker run --rm -v "$HOME/.docker/config.json:/root/.docker/config.json:ro" \
              anchore/syft:v1.33.0@sha256:f94e5d9fce1f2278491a8e3a63bd5f6ddb81fdfdbb8bf7a1637565c1d5344357 \
              "$IMAGE_NAME@$DIGEST" --platform "linux/$arch" -o spdx-json >"sbom-$arch.spdx.json"
          done

      - name: Install cosign
        uses: sigstore/cosign-installer@d7543c93d881b35a8faa02e8e3605f69b7a1ce62 # v3.10.0

      - name: Sign and verify the exact digest
        env:
          DIGEST: ${{ steps.image.outputs.digest }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          identity="https://github.com/$GITHUB_REPOSITORY/.github/workflows/release-candidate.yml@refs/tags/$RELEASE_TAG"
          issuer=https://token.actions.githubusercontent.com
          cosign sign --yes "$IMAGE_NAME@$DIGEST"
          cosign verify --certificate-identity "$identity" --certificate-oidc-issuer "$issuer" "$IMAGE_NAME@$DIGEST" >signature-verification.json

      - name: Package chart once
        env:
          DIGEST: ${{ steps.image.outputs.digest }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          mkdir chart-dist
          helm package deploy/helm-chart/kubernetes-secret-generator \
            --destination chart-dist \
            --version "${RELEASE_TAG#v}" \
            --app-version "$RELEASE_TAG"
          chart="chart-dist/kubernetes-secret-generator-${RELEASE_TAG#v}.tgz"
          test -f "$chart"
          chart_sha=sha256:$(sha256sum "$chart" | awk '{print $1}')
          printf '%s\n' "$chart_sha" >chart-sha256.txt
          jq -n --arg tag "$RELEASE_TAG" --arg source "$GITHUB_SHA" --arg image "$DIGEST" --arg chart "$chart_sha" \
            '{schemaVersion:1,releaseTag:$tag,sourceCommit:$source,imageDigest:$image,chartSHA256:$chart}' >candidate.json

      - name: Run disposable kind release smoke
        env:
          CANDIDATE_IMAGE: ${{ env.IMAGE_NAME }}@${{ steps.image.outputs.digest }}
          KIND_SHA256: eb244cbafcc157dff60cf68693c14c9a75c4e6e6fedaf9cd71c58117cb93e3fa
          PREFLIGHT_REPORT_OUT: ${{ github.workspace }}/preflight-report.md
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          curl -fsSLo kind https://github.com/kubernetes-sigs/kind/releases/download/v0.31.0/kind-linux-amd64
          echo "$KIND_SHA256  kind" | sha256sum -c -
          sudo install kind /usr/local/bin/kind
          CHART_TGZ="$GITHUB_WORKSPACE/chart-dist/kubernetes-secret-generator-${RELEASE_TAG#v}.tgz"
          export CHART_TGZ
          if timeout 15m test/e2e/release-smoke.sh >release-smoke-summary.json; then
            cat release-smoke-summary.json
          else
            status=$?
            cat release-smoke-summary.json
            exit "$status"
          fi
          jq -e '.status == "passed" and .durationSeconds >= 600 and .durationSeconds < 900 and .healthChecks >= 1 and .controller == {ready:true,restarts:0,panicOrOOM:false,recovered:true}' release-smoke-summary.json >/dev/null

      - name: Scan and stage sanitized failure diagnostics
        id: scan_failure_diagnostics
        if: failure()
        run: |
          diagnostics_dir="$RUNNER_TEMP/release-candidate-diagnostics"
          rm -rf "$diagnostics_dir"
          mkdir -m 700 "$diagnostics_dir"
          if test -e preflight-report.md; then
            scripts/check-test-artifacts.sh preflight-report.md
            install -m 400 preflight-report.md "$diagnostics_dir/preflight-report.md"
            chmod 500 "$diagnostics_dir"
            echo "path=$diagnostics_dir" >>"$GITHUB_OUTPUT"
            echo 'ready=true' >>"$GITHUB_OUTPUT"
          else
            echo 'ready=false' >>"$GITHUB_OUTPUT"
          fi

      - name: Upload sanitized failure diagnostics
        if: ${{ failure() && steps.scan_failure_diagnostics.outcome == 'success' && steps.scan_failure_diagnostics.outputs.ready == 'true' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-candidate-diagnostics-${{ github.run_id }}
          path: ${{ steps.scan_failure_diagnostics.outputs.path }}
          if-no-files-found: error
          retention-days: 7

      - name: Stage candidate artifact
        run: |
          mkdir candidate-artifact
          cp candidate.json image-digest.txt image-platforms.json chart-sha256.txt signature-verification.json \
            grype-amd64.json grype-arm64.json sbom-amd64.spdx.json sbom-arm64.spdx.json \
            preflight-report.md release-smoke-summary.json candidate-artifact/
          cp chart-dist/*.tgz candidate-artifact/

      - name: Upload candidate artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-candidate
          path: candidate-artifact
          if-no-files-found: error
          retention-days: 30
