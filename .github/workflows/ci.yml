name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

env:
  GO_VERSION: 1.26.5

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install actionlint
        run: |
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
          echo "$(go env GOPATH)/bin" >>"$GITHUB_PATH"

      - name: Install locked Helm
        env:
          HELM_INSTALL_DIR: ${{ runner.temp }}/helm-bin
        run: |
          scripts/install-helm.sh
          echo "$HELM_INSTALL_DIR" >>"$GITHUB_PATH"

      - name: Reproduce Kubernetes 1.34 legacy CRD managed fields safely
        run: |
          curl -fsSLo kind https://github.com/kubernetes-sigs/kind/releases/download/v0.31.0/kind-linux-amd64
          echo 'eb244cbafcc157dff60cf68693c14c9a75c4e6e6fedaf9cd71c58117cb93e3fa  kind' | sha256sum -c -
          sudo install kind /usr/local/bin/kind
          cluster="ksg-managed-fields-134-$GITHUB_RUN_ID"
          trap 'kind delete cluster --name "$cluster" >/dev/null 2>&1 || true' EXIT
          kind create cluster --name "$cluster" --image "$(awk -F= '$1=="kind.node.v1.34.3"{print $2}' tools.lock)" --wait 180s
          kubectl apply -f test/fixtures/v3.4.1/crds >/dev/null
          kubectl wait --for=condition=Established --timeout=60s \
            crd/basicauths.secretgenerator.mittwald.de \
            crd/sshkeypairs.secretgenerator.mittwald.de \
            crd/stringsecrets.secretgenerator.mittwald.de >/dev/null
          kubectl get crd basicauths.secretgenerator.mittwald.de --show-managed-fields=true -o json | jq -c \
            '[.metadata.managedFields[] | {manager,operation,apiVersion,subresource:(.subresource // ""),fieldPaths:([(.fieldsV1 // {}) | paths | map(tostring) | join(".")] | sort)}]'

      - name: Verify source
        run: make test-source

      - name: Run unit tests
        run: make test-unit

      - name: Run race tests
        run: make test-race

      - name: Enforce coverage
        run: make test-coverage

      - name: Verify safety guards
        run: make test-safety

      - name: Verify supply chain policy
        run: make test-supply-chain

      - name: Verify Helm chart
        run: make test-helm

      - name: Verify documentation examples
        env:
          DOC_EXAMPLES_HELM: ${{ runner.temp }}/helm-bin/helm
        run: make test-docs
