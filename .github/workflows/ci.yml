name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

env:
  GO_VERSION: 1.26.5

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install actionlint
        run: |
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
          echo "$(go env GOPATH)/bin" >>"$GITHUB_PATH"

      - name: Install locked Helm
        env:
          HELM_INSTALL_DIR: ${{ runner.temp }}/helm-bin
        run: |
          scripts/install-helm.sh
          echo "$HELM_INSTALL_DIR" >>"$GITHUB_PATH"

      - name: Verify source
        run: make test-source

      - name: Run unit tests
        run: make test-unit

      - name: Run race tests
        run: make test-race

      - name: Enforce coverage
        run: make test-coverage

      - name: Verify safety guards
        run: make test-safety

      - name: Verify supply chain policy
        run: make test-supply-chain

      - name: Verify Helm chart
        run: make test-helm

      - name: Verify documentation examples
        env:
          DOC_EXAMPLES_HELM: ${{ runner.temp }}/helm-bin/helm
        run: make test-docs
