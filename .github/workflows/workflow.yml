name: Go

# Trigger the workflow on push or pull request
on:
  push:
    branches:
      - "master"
  pull_request:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish"
        required: false
        type: string

permissions:
  contents: read
  packages: write

env:
  KUBECONFIG: /tmp/kubeconfig
  GO_VERSION: 1.26.4
  IMAGE_NAME: ghcr.io/mrchypark/kubernetes-secret-generator
  CC_TEST_REPORTER_ID: ${{ secrets.codeClimateReporterID }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
        id: go

      - name: Check out code into the Go module directory
        uses: actions/checkout@v7

      - name: Install golangci-lint
        run: |
          curl -sfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh| sh -s -- -b "$(go env GOPATH)"/bin v2.7.1

      - name: Run golangci-lint
        run: |
          "$(go env GOPATH)"/bin/golangci-lint run -v --timeout 5m

      - name: Create kind cluster and apply crds
        run: make crd

      - name: Hack Code Climate and Go Modules
        if: github.event_name != 'pull_request' && env.CC_TEST_REPORTER_ID != ''
        run: mkdir -p github.com/mittwald && ln -sf "$(pwd)" github.com/mittwald/kubernetes-secret-generator

      - name: Test & publish code coverage
        if: github.event_name != 'pull_request' && env.CC_TEST_REPORTER_ID != ''
        uses: paambaati/codeclimate-action@v2.7.5
        with:
          coverageCommand: go test -coverprofile=c.out ./...
          debug: true
          prefix: "github.com/${{ github.repository }}/"

      - name: Go Test
        run: go test -coverprofile=c.out -coverpkg=./pkg/...  ./...

  build:
    name: Build Image
    runs-on: ubuntu-latest
    steps:
      - name: Check out code into the Go module directory
        uses: actions/checkout@v7

      - name: Build Image
        run: docker build -f build/Dockerfile --build-arg VERSION="${GITHUB_SHA::8}" -t "$IMAGE_NAME:latest" .

  deploymaster:
    name: Deploy Latest Image
    runs-on: ubuntu-latest
    needs: ["test", "build"]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - name: Check out code into the Go module directory
        uses: actions/checkout@v7

      - name: Registry Login
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build latest image
        run: docker build -f build/Dockerfile --build-arg VERSION="${GITHUB_SHA::8}" -t "$IMAGE_NAME:latest" .

      - name: Push latest tag
        run: docker push "$IMAGE_NAME:latest"

  deployrelease:
    name: Deploy Release Image
    runs-on: ubuntu-latest
    needs: ["test", "build"]
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.release_tag != '')
    steps:
      - name: Check out code into the Go module directory
        uses: actions/checkout@v7

      - name: Registry Login
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build tagged image
        env:
          VERSION_TAG: ${{ github.event.release.tag_name || inputs.release_tag }}
        run: |
          docker build -f build/Dockerfile --build-arg VERSION="$VERSION_TAG" -t "$IMAGE_NAME:latest" -t "$IMAGE_NAME:$VERSION_TAG" .

      - name: Push images
        env:
          VERSION_TAG: ${{ github.event.release.tag_name || inputs.release_tag }}
        run: |
          docker push "$IMAGE_NAME:latest"
          docker push "$IMAGE_NAME:$VERSION_TAG"
