global:
  imageRegistry: ""
  imagePullSecrets: []

image:
  registry: ghcr.io
  repository: mrchypark/kubernetes-secret-generator
  tag: v4.0.0-rc.9
  digest: ""
  pullPolicy: IfNotPresent
  pullSecrets: []

profile: production
replicaCount: null
compatibilityProfile: v4

scope:
  mode: ownNamespace
  namespaces: []

# Upgrades require confirmedScope. For namespaces mode, calculate the SHA-256
# over sorted, unique namespace names joined by "\n" without a trailing newline.
migration:
  confirmedScope: ""
  confirmedNamespacesSHA256: ""

# CRD installation/upgrades are a separate lifecycle. The direct manager is
# scripts/helm-release.sh; Flux uses HelmRelease CreateReplace policies.
crdLifecycle:
  manager: direct
crdControllers:
  enabled: true

leaderElection:
  enabled: true
  id: kubernetes-secret-generator-lock

args: []
nameOverride: ""
fullnameOverride: ""
priorityClassName: ""
terminationGracePeriodSeconds: 30

serviceAccount:
  create: true
  name: ""
  automountServiceAccountToken: true

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []
volumeMounts: []
volumes: []

regenerateInsecure: false
secretLength: 40
sshKeyAlgorithm: rsa

rbac:
  create: true

metrics:
  service:
    enabled: true
    port: 8383
    annotations: {}
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    labels: {}

pdb:
  enabled: true
  minAvailable: 1

networkPolicy:
  enabled: false
  ingress: []
  egress:
    enabled: false
    rules: []

livenessProbe:
  enabled: true
  initialDelaySeconds: 6
  periodSeconds: 10
  timeoutSeconds: 2
  successThreshold: 1
  failureThreshold: 3

readinessProbe:
  enabled: true
  initialDelaySeconds: 3
  periodSeconds: 5
  timeoutSeconds: 2
  successThreshold: 1
  failureThreshold: 3
