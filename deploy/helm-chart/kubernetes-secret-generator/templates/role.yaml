{{- if and .Values.rbac.create .Values.leaderElection.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "kubernetes-secret-generator.rbacName" . }}-leader
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubernetes-secret-generator.labels" . | nindent 4 }}
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["create"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    resourceNames: [{{ .Values.leaderElection.id | quote }}]
    verbs: ["get", "update"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
{{- end }}
{{- if and .Values.rbac.create (ne .Values.scope.mode "cluster") }}
{{- $root := . }}
{{- $namespaces := list .Release.Namespace }}
{{- if eq .Values.scope.mode "namespaces" }}
{{- $namespaces = sortAlpha .Values.scope.namespaces }}
{{- end }}
{{- range $namespace := $namespaces }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "kubernetes-secret-generator.rbacName" $root }}-access
  namespace: {{ $namespace }}
  labels:
    {{- include "kubernetes-secret-generator.labels" $root | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  {{- if $root.Values.crdControllers.enabled }}
  - apiGroups: ["secretgenerator.mittwald.de"]
    resources: ["basicauths", "sshkeypairs", "stringsecrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["secretgenerator.mittwald.de"]
    resources: ["basicauths/status", "sshkeypairs/status", "stringsecrets/status"]
    verbs: ["get", "update", "patch"]
  {{- end }}
{{- end }}
{{- end }}
