apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kubernetes-secret-generator.fullname" . }}-crd-lifecycle-owner
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubernetes-secret-generator.labels" . | nindent 4 }}
    secretgenerator.mittwald.de/crd-lifecycle-owner: "true"
  annotations:
    helm.sh/resource-policy: keep
data:
  manager: {{ .Values.crdLifecycle.manager | quote }}
  releaseNamespace: {{ .Release.Namespace | quote }}
  releaseName: {{ .Release.Name | quote }}
  chartVersion: {{ .Chart.Version | quote }}
  scopeMode: {{ .Values.scope.mode | quote }}
  namespacesSHA256: {{ ternary (sha256sum (join "\n" (sortAlpha .Values.scope.namespaces))) "" (eq .Values.scope.mode "namespaces") | quote }}
  orphanedFluxApprovalRef: {{ .Values.migration.orphanedFluxApprovalRef | quote }}
  orphanedFluxApprover: {{ .Values.migration.orphanedFluxApprover | quote }}
  orphanedFluxApprovalReplacementRef: {{ .Values.migration.orphanedFluxApprovalReplacementRef | quote }}
